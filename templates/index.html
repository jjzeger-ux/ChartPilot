<!DOCTYPE html>
<html>
<head>
  <title>ChartPilot</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #f6f8fb;
      color: #1f2937;
    }

    .topbar {
      height: 72px;
      background: white;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 36px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      flex-direction: column;
    }

    .logo-main {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -1px;
      color: #111827;
    }

    .logo-sub {
      font-size: 14px;
      color: #6b7280;
    }

    .excel {
      color: #d71920;
      font-weight: 900;
    }

    .status-pill {
      padding: 10px 16px;
      border-radius: 999px;
      background: #eef6ff;
      color: #075985;
      font-weight: 700;
      font-size: 14px;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 24px;
      padding: 28px 36px;
    }

    .panel {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      padding: 24px;
    }

    .panel h2 {
      margin-top: 0;
      font-size: 20px;
      color: #111827;
    }

    .subtitle {
      color: #6b7280;
      font-size: 14px;
      margin-top: -8px;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 12px;
      transition: 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .btn-start {
      background: #0f766e;
      color: white;
    }

    .btn-stop {
      background: #dc2626;
      color: white;
    }

    .btn-secondary {
      background: #eef2f7;
      color: #111827;
    }

    .btn-copy {
      background: #2563eb;
      color: white;
      margin-top: 18px;
    }

    .mode-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 18px;
      font-size: 14px;
    }

    .mode-box label {
      display: flex;
      gap: 10px;
      align-items: center;
      font-weight: 700;
      cursor: pointer;
    }

    .transcript-box {
      margin-top: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 800;
      color: #374151;
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      min-height: 90px;
      padding: 14px;
      font-size: 15px;
      resize: vertical;
      outline: none;
      background: #fbfdff;
    }

    textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
      background: white;
    }

    #transcript {
      min-height: 260px;
    }

    .review-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .full {
      grid-column: span 2;
    }

    .section-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
    }

    .hero {
      margin-bottom: 22px;
      padding: 20px;
      border-radius: 18px;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: white;
    }

    .hero h1 {
      margin: 0;
      font-size: 26px;
    }

    .hero p {
      margin-bottom: 0;
      color: #dbeafe;
    }

    @media (max-width: 950px) {
      .layout {
        grid-template-columns: 1fr;
        padding: 18px;
      }

      .review-grid {
        grid-template-columns: 1fr;
      }

      .full {
        grid-column: span 1;
      }
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="logo">
      <div class="logo-main">ChartPilot</div>
      <div class="logo-sub">Clinical intake intelligence for <span class="excel">excelENT</span></div>
    </div>
    <div class="status-pill" id="status">Status: Ready</div>
  </div>

  <div class="layout">

    <div class="panel">
      <h2>Encounter Controls</h2>
      <p class="subtitle">Start, stop, and generate structured intake notes.</p>

      <div class="mode-box">
        <label>
          <input type="checkbox" id="liveMode">
          Live Mode: populate boxes while speaking
        </label>
      </div>

      <button class="btn-start" onclick="startEncounter()">Start Encounter</button>
      <button class="btn-stop" onclick="endEncounter()">End Encounter & Generate Final Note</button>
      <button class="btn-secondary" onclick="clearAll()">Clear Encounter</button>

      <div class="transcript-box">
        <label>Live Transcript</label>
        <textarea id="transcript" placeholder="Transcript will appear here..."></textarea>
      </div>
    </div>

    <div class="panel">
      <div class="hero">
        <h1>Doctor Review Dashboard</h1>
        <p>AI-generated intake note. Edit before copying into the chart.</p>
      </div>

      <div class="review-grid">

        <div class="section-card">
          <label>Chief Complaint</label>
          <textarea id="chief_complaint"></textarea>
        </div>

        <div class="section-card">
          <label>Medications</label>
          <textarea id="medications"></textarea>
        </div>

        <div class="section-card full">
          <label>HPI</label>
          <textarea id="hpi"></textarea>
        </div>

        <div class="section-card">
          <label>ROS</label>
          <textarea id="ros"></textarea>
        </div>

        <div class="section-card">
          <label>Allergies</label>
          <textarea id="allergies"></textarea>
        </div>

        <div class="section-card full">
          <label>Doctor Handoff</label>
          <textarea id="doctor_handoff"></textarea>
        </div>

      </div>

      <button class="btn-copy" onclick="copyNote()">Copy Full Note</button>
    </div>

  </div>

  <script>
    let mediaRecorder;
    let audioChunks = [];
    let fullTranscript = "";
    let encounterActive = false;
    let cycleRunning = false;

    async function startEncounter() {
      if (encounterActive) return;

      encounterActive = true;
      fullTranscript = document.getElementById("transcript").value || "";
      document.getElementById("status").innerText = "Status: Encounter started";

      if (document.getElementById("liveMode").checked) {
        runLiveCycle();
      } else {
        startFullRecording();
      }
    }

    async function startFullRecording() {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream, { mimeType: "audio/webm" });

      mediaRecorder.ondataavailable = event => {
        if (event.data.size > 0) {
          audioChunks.push(event.data);
        }
      };

      mediaRecorder.start();
      document.getElementById("status").innerText = "Status: Recording full encounter";
    }

    async function runLiveCycle() {
      if (!encounterActive || cycleRunning) return;

      cycleRunning = true;

      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream, { mimeType: "audio/webm" });

      mediaRecorder.ondataavailable = event => {
        if (event.data.size > 0) {
          audioChunks.push(event.data);
        }
      };

      mediaRecorder.onstop = async () => {
        const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
        await transcribeAndMaybeUpdate(audioBlob, true);

        cycleRunning = false;

        if (encounterActive) {
          setTimeout(runLiveCycle, 300);
        }
      };

      mediaRecorder.start();
      document.getElementById("status").innerText = "Status: Live recording";

      setTimeout(() => {
        if (mediaRecorder && mediaRecorder.state !== "inactive") {
          mediaRecorder.stop();
        }
      }, 10000);
    }

    async function endEncounter() {
      encounterActive = false;
      document.getElementById("status").innerText = "Status: Ending encounter";

      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.onstop = async () => {
          const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
          await transcribeAndMaybeUpdate(audioBlob, false);
          await generateNote();
          document.getElementById("status").innerText = "Status: Final note ready";
        };

        mediaRecorder.stop();
      } else {
        await generateNote();
        document.getElementById("status").innerText = "Status: Final note ready";
      }
    }

    async function transcribeAndMaybeUpdate(audioBlob, liveUpdate) {
      document.getElementById("status").innerText = "Status: Transcribing audio";

      const formData = new FormData();
      formData.append("audio", audioBlob, "recording.webm");

      const transcriptResponse = await fetch("/transcribe", {
        method: "POST",
        body: formData
      });

      const transcriptData = await transcriptResponse.json();

      if (transcriptData.transcript && transcriptData.transcript.trim() !== "") {
        fullTranscript += " " + transcriptData.transcript.trim();
        document.getElementById("transcript").value = fullTranscript.trim();
      }

      if (liveUpdate) {
        document.getElementById("status").innerText = "Status: Updating boxes";

        const noteResponse = await fetch("/live_update", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            transcript: fullTranscript,
            current_note: getCurrentNote()
          })
        });

        const data = await noteResponse.json();
        fillNoteBoxes(data);

        document.getElementById("status").innerText = "Status: Listening";
      }
    }

    async function generateNote() {
      const transcript = document.getElementById("transcript").value;

      const response = await fetch("/generate", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ transcript })
      });

      const data = await response.json();
      fillNoteBoxes(data);
    }

    function getCurrentNote() {
      return {
        chief_complaint: document.getElementById("chief_complaint").value,
        hpi: document.getElementById("hpi").value,
        ros: document.getElementById("ros").value,
        medications: document.getElementById("medications").value,
        allergies: document.getElementById("allergies").value,
        doctor_handoff: document.getElementById("doctor_handoff").value
      };
    }

    function fillNoteBoxes(data) {
      document.getElementById("chief_complaint").value = data.chief_complaint || "";
      document.getElementById("hpi").value = data.hpi || "";
      document.getElementById("ros").value = data.ros || "";
      document.getElementById("medications").value = data.medications || "";
      document.getElementById("allergies").value = data.allergies || "";
      document.getElementById("doctor_handoff").value = data.doctor_handoff || "";
    }

    function copyNote() {
      const note = `
Chief Complaint:
${document.getElementById("chief_complaint").value}

HPI:
${document.getElementById("hpi").value}

ROS:
${document.getElementById("ros").value}

Medications:
${document.getElementById("medications").value}

Allergies:
${document.getElementById("allergies").value}

Doctor Handoff:
${document.getElementById("doctor_handoff").value}
`;

      navigator.clipboard.writeText(note);
      alert("Note copied.");
    }

    function clearAll() {
      fullTranscript = "";
      encounterActive = false;
      cycleRunning = false;

      document.getElementById("transcript").value = "";
      document.getElementById("chief_complaint").value = "";
      document.getElementById("hpi").value = "";
      document.getElementById("ros").value = "";
      document.getElementById("medications").value = "";
      document.getElementById("allergies").value = "";
      document.getElementById("doctor_handoff").value = "";
      document.getElementById("status").innerText = "Status: Ready";
    }
  </script>

</body>
</html>
