<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ChartPilot — Locked</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Jacob Zeger">
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    html, body { height: 100%; }
    body {
      font-family: var(--font);
      background:
        radial-gradient(1000px 600px at 100% -10%, rgba(37,99,235,0.16), transparent 55%),
        radial-gradient(900px 600px at -5% 110%, rgba(13,148,136,0.13), transparent 52%),
        radial-gradient(700px 460px at 50% 120%, rgba(124,58,237,0.10), transparent 58%),
        linear-gradient(180deg, #0a0d14 0%, #07090f 100%);
      color: #e2e8f0;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
      -webkit-font-smoothing: antialiased;
    }

    .lock-card {
      width: 360px; max-width: 94vw;
      background: linear-gradient(180deg, rgba(20,26,40,0.9), rgba(12,16,26,0.9));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px; padding: 34px 30px;
      box-shadow: 0 30px 70px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.05);
      text-align: center;
    }

    .brand-row { display: flex; align-items: center; justify-content: center; gap: 11px; margin-bottom: 6px; }
    .brand-icon { width: 38px; height: 38px; filter: drop-shadow(0 3px 10px rgba(59,130,246,0.5)); }
    .brand-word { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: #f1f5f9; }
    .brand-word span { color: #5eead4; }

    .clinic { font-size: 11.5px; color: #4b5a6e; font-weight: 600; letter-spacing: 0.04em; margin-bottom: 22px; }
    .clinic em { color: #f87171; font-style: normal; font-weight: 700; }

    .proto-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(217,119,6,0.14); border: 1px solid rgba(217,119,6,0.3);
      color: #fbbf24; font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
      padding: 5px 11px; border-radius: 999px; margin-bottom: 20px; text-transform: uppercase;
    }

    .title { font-size: 16px; font-weight: 700; color: #f1f5f9; margin-bottom: 5px; }
    .sub   { font-size: 13px; color: #64748b; line-height: 1.5; margin-bottom: 22px; }

    .pin-input {
      width: 100%; padding: 14px 16px; font-size: 24px; font-weight: 800;
      letter-spacing: 0.5em; text-align: center;
      background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 13px; color: #f1f5f9; outline: none; font-family: var(--font);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .pin-input::placeholder { letter-spacing: 0.4em; color: #334155; }
    .pin-input:focus { border-color: rgba(59,130,246,0.55); box-shadow: 0 0 0 4px rgba(59,130,246,0.14); }
    .pin-input.error { border-color: rgba(239,68,68,0.6); animation: shake 0.3s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-7px)} 40%,80%{transform:translateX(7px)} }

    .unlock-btn {
      margin-top: 14px; width: 100%; padding: 13px;
      background: linear-gradient(135deg, #1d4ed8, #3b82f6); color: white; border: none;
      border-radius: 12px; font-family: var(--font); font-size: 14.5px; font-weight: 700;
      cursor: pointer; transition: filter 0.15s, transform 0.12s, box-shadow 0.15s;
      box-shadow: 0 6px 18px rgba(37,99,235,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
    }
    .unlock-btn:hover { filter: brightness(1.07); transform: translateY(-1px); }
    .unlock-btn:active { transform: translateY(0); }

    .err { font-size: 12.5px; color: #f87171; margin-top: 12px; min-height: 18px; font-weight: 600; }
    .foot { font-size: 11px; color: #334155; margin-top: 18px; }

    @media (prefers-reduced-motion: reduce) { .pin-input.error { animation: none; } }
  </style>
</head>
<body>
  <div class="lock-card">
    <div class="brand-row">
      <img src="/static/favicon.png" class="brand-icon" alt="ChartPilot">
      <div class="brand-word">Chart<span>Pilot</span></div>
    </div>
    <div class="clinic">for Excel<em>ENT</em> Clinic</div>

    <div class="proto-badge">
      <svg width="11" height="11" viewBox="0 0 13 13" fill="none"><path d="M6.5 1L12 11.5H1L6.5 1z" stroke="#fbbf24" stroke-width="1.3" stroke-linejoin="round"/><path d="M6.5 5v3M6.5 9.5h.01" stroke="#fbbf24" stroke-width="1.3" stroke-linecap="round"/></svg>
      Prototype
    </div>

    <div class="title">Enter access PIN</div>
    <div class="sub">This site is in prototype access. Enter the clinic PIN to continue.</div>

    <input class="pin-input" id="pinInput" type="password" inputmode="numeric" placeholder="•••••"
           maxlength="10" autocomplete="off" autofocus
           onkeydown="if(event.key==='Enter')submitPin()">
    <button class="unlock-btn" onclick="submitPin()">Unlock</button>
    <div class="err" id="err"></div>

    <div class="foot">ChartPilot · Jacob Zeger</div>
  </div>

  <script>
    function submitPin() {
      var input = document.getElementById("pinInput");
      var err = document.getElementById("err");
      var pin = input.value;
      fetch("/unlock", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pin: pin })
      }).then(function(r) {
        if (r.ok) {
          window.location.reload();
        } else {
          err.textContent = "Incorrect PIN — try again.";
          input.value = "";
          input.classList.add("error");
          setTimeout(function() { input.classList.remove("error"); err.textContent = ""; input.focus(); }, 1100);
        }
      }).catch(function() {
        err.textContent = "Connection error — try again.";
      });
    }
  </script>
</body>
</html>
